services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parallax
      POSTGRES_PASSWORD: parallax
      POSTGRES_DB: parallax
    ports:
      - "5432:5432"
    volumes:
      - parallax_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  parallax_pg:
